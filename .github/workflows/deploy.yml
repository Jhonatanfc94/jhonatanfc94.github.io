name: Deploy

on: push

jobs:
  first_job:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis
        ports:
        - 6379:6379

    steps:
      - name: Print
        run: echo "${{ secrets.SECRET }}"
      
      - name: checkout
        uses: actions/checkout@v4

      - name: setup
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run test
        run: npm run test

      - name: Build
        run: npm run build

      - name: upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  deploy:
    #if: ${{ always() }}
    runs-on: ubuntu-latest
    needs: first_job

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment-pages.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment-pages
        uses: actions/deploy-pages@v4